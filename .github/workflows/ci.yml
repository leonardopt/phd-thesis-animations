name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install system dependencies for Manim
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev ffmpeg libcairo2-dev libpango1.0-dev pkg-config ripgrep

      - name: Sync project dependencies
        run: uv sync --group dev --locked

      - name: Run tests
        run: uv run python -m pytest -q

      - name: Check publication hygiene
        run: |
          set -euo pipefail

          if git ls-files | rg -n '^(media/|\.mplconfig/|\.tmp_|assets/native_specs/|assets/hybrid_wtext_deck\.toml$|assets/presentation_hybrid_deck\.toml$|assets/presentation_hybrid_native_deck\.toml$|assets/presentation_hybrid_text_deck\.toml$|fallback_pdf\.pdf$|study_static_rescue_deck\.pdf$|phd-defence-presentation_.*\.pdf$|pres_to_transform\.key\.key$|.*\.key$|.*\.pptx$)'; then
            echo "Forbidden generated or local-only paths are still tracked."
            exit 1
          fi

          if rg -n '/Users/leonardo|presentation_video_order\.md' README.md assets scripts tests scenes; then
            echo "Found a hard-coded local path or a README link into ignored build output."
            exit 1
          fi
