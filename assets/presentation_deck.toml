[deck]
deck_base_name = "phd-defence-presentation"
output_dir = "media/keynote"
slide_width = 1920
slide_height = 1080
presenter_notes_path = "assets/presenter_notes.md"

# Video sequences can use the {{quality_dir}} placeholder, or point to an
# explicit render folder when different sections currently live at mixed
# qualities.
# Presenter notes for media slides can live in assets/presenter_notes.md.
# Use one `## media/path.mp4` section per slide in that file.

[[slide]]
type = "title"
title = """
Assessing Neural Representations of
Naturalistic Images Across Perception and Memory
Using Deep Generative Modelling
"""
body = """
27.04.2026
Leonardo Pettini
"""

[[slide]]
type = "section"
title = "1 Introduction"

[[slide]]
type = "video_sequence"
glob = "media/videos/01_intro/1080p60/sections/*.mp4"

[[slide]]
type = "section"
title = "2 Methodological Approach"

[[slide]]
type = "video_sequence"
glob = "media/videos/02_methods/1080p60/sections/*.mp4"

[[slide]]
type = "section"
title = "3 Study 1"

[[slide]]
type = "video_sequence"
globs = ["media/videos/03_study1/480p15/sections/00[0-9]_*.mp4", "media/videos/03_study1/480p15/sections/01[0-6]_*.mp4"]

[[slide]]
type = "video_sequence"
paths = ["media/videos/03_study1/480p15/sections/022_study1_stage3_memory_exp_design.mp4", "media/videos/03_study1/480p15/sections/022_study1_stage3_memory_exp_results.mp4"]

[[slide]]
type = "section"
title = "4 Study 2"

[[slide]]
type = "video_sequence"
glob = "media/videos/04_study2/1080p60/sections/*.mp4"

[[slide]]
type = "section"
title = "5 Conclusion"

[[slide]]
type = "video_sequence"
glob = "media/videos/05_conclusion/480p15/sections/*.mp4"

[[slide]]
type = "text"
title = "Acknowledgments"
subtitle = "Thanks to everyone who made this work possible"
body = """
Supervisors, mentors, and committee members
Collaborators and lab colleagues
Research participants and supporting teams
Friends and family
"""

[[slide]]
type = "section"
title = "6 Supplementary Slides"

[[slide]]
type = "video_sequence"
paths = ["media/videos/06_supplementary/480p15/sections/000_study1_stage3_memory_intro_a.mp4", "media/videos/06_supplementary/480p15/sections/001_study1_stage3_memory_intro_b.mp4", "media/videos/06_supplementary/480p15/sections/002_study1_stage3_memory_intro_c.mp4", "media/videos/06_supplementary/480p15/sections/003_study1_stage3_memory_intro_d.mp4", "media/videos/06_supplementary/480p15/sections/004_study1_stage3_memory_intro_e.mp4"]

