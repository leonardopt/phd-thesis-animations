[deck]
deck_base_name = "phd-defence-presentation"
output_dir = "media/keynote"
slide_width = 1920
slide_height = 1080
presenter_notes_path = "assets/presenter_notes.md"

# Video sequences use the {{quality_dir}} placeholder.
# The AppleScript maps standard Manim flags like -ql/-qm/-qh/-qk
# to folders such as 480p15/720p30/1080p60/2160p60.
# Presenter notes for media slides can live in assets/presenter_notes.md.
# Use one `## media/path.mp4` section per slide in that file.

[[slide]]
type = "title"
title = "Perception and Memory in Rich Visual Settings"
subtitle = "Sensory recruitment, naturalistic stimuli, and long-term memory interactions"
body = """
Leonardo Pettini
PhD Defence
23 April 2026
"""

[[slide]]
type = "section"
title = "Introduction"
subtitle = "Working memory, sensory recruitment, and the thesis questions"

[[slide]]
type = "video_sequence"
glob = "media/videos/01_intro/{{quality_dir}}/sections/*.mp4"

[[slide]]
type = "section"
title = "Methods"
subtitle = "Stimulus requirements, diffusion pipeline, and study plan"

[[slide]]
type = "video_sequence"
glob = "media/videos/02_methods/{{quality_dir}}/sections/*.mp4"

[[slide]]
type = "section"
title = "Study 1"
subtitle = "Core animation sequence"

[[slide]]
type = "video_sequence"
glob = "media/videos/03_study1/{{quality_dir}}/sections/*.mp4"

[[slide]]
type = "section"
title = "Study 2"
subtitle = "Core animation sequence"

[[slide]]
type = "video_sequence"
glob = "media/videos/04_study2/{{quality_dir}}/sections/*.mp4"

[[slide]]
type = "section"
title = "Conclusions"
subtitle = "Questions revisited, main results, and future directions"

[[slide]]
type = "video_sequence"
glob = "media/videos/05_conclusion/{{quality_dir}}/sections/*.mp4"

[[slide]]
type = "text"
title = "Acknowledgments"
subtitle = "Thanks to everyone who made this work possible"
body = """
Supervisors, mentors, and committee members
Collaborators and lab colleagues
Research participants and supporting teams
Friends and family
"""

[[slide]]
type = "section"
title = "Appendix"
subtitle = "Add static slides or backup animations below"

